# ═══════════════════════════════════════════════════════════════════════════════
# PrepPilot — API reverse proxy for Nginx
#
# These three `location` blocks route the backend's API paths to the Node server
# on 127.0.0.1:3000. PASTE THEM INTO your EXISTING HTTPS `server { }` block for
# preppilot.shop (the one Certbot created, listening on 443) — place them ABOVE
# the existing `location / { ... }` that serves the React app.
#
# Do NOT replace your whole config with this file — it is only the API part.
# Your client routes (/login, /dashboard, /settings, ...) do not overlap these
# paths, so the SPA keeps working untouched.
#
# After editing:   sudo nginx -t  &&  sudo systemctl reload nginx
# Verify:          curl https://preppilot.shop/api/whatsapp/sandbox-info
#                  (should return JSON, not the HTML of your React app)
# ═══════════════════════════════════════════════════════════════════════════════

location /auth {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /profile {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /api {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ── Optional: health-check the backend through the domain ──
# location = /health {
#     proxy_pass http://127.0.0.1:3000;
# }

# ───────────────────────────────────────────────────────────────────────────────
# FULL REFERENCE (for comparison only — do not blindly overwrite a working
# config). Once merged, your server block looks roughly like this:
#
# server {
#     server_name preppilot.shop www.preppilot.shop;
#     listen 443 ssl;                     # managed by Certbot
#     ssl_certificate     /etc/letsencrypt/live/preppilot.shop/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/preppilot.shop/privkey.pem;
#
#     location /auth    { proxy_pass http://127.0.0.1:3000; ...headers... }
#     location /profile { proxy_pass http://127.0.0.1:3000; ...headers... }
#     location /api     { proxy_pass http://127.0.0.1:3000; ...headers... }
#
#     # Your existing frontend serving — ONE of these:
#     #   (a) static build (recommended for prod):
#     #       root /home/ubuntu/PrepPilot/frontend/dist;
#     #       location / { try_files $uri /index.html; }
#     #   (b) proxy to the `frontend` PM2 process (whatever port it listens on):
#     #       location / { proxy_pass http://127.0.0.1:4173; }
# }
# ───────────────────────────────────────────────────────────────────────────────
