<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PrepPilot — Your AI interview coach on WhatsApp. One sharp question a day, honest feedback, and a readiness score that actually moves." />
    <title>PrepPilot — AI Interview Coach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&display=swap" rel="stylesheet" />
    <script>
      // Applies the saved theme before first paint, so a dark-mode user never
      // sees a white flash while React boots. Kept in sync with
      // src/store/ThemeContext.tsx (same storage key, same fallback).
      (function () {
        try {
          var stored = localStorage.getItem('preppilot-theme');
          var dark =
            stored === 'dark' ||
            (stored === null &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          }
        } catch (e) {
          /* localStorage blocked — fall through to light. */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
